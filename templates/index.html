<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSI Fan Control</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>MSI Fan Control</h1>
            <div id="connection-status">
                <span class="dot"></span> <span id="status-text">Connecting...</span>
            </div>
        </header>

        <main class="dashboard">
            <!-- CPU Section -->
            <div class="card glass">
                <div class="card-header">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>
                    CPU
                </div>
                <div class="metrics">
                    <div class="metric">
                        <span class="label">Temperature</span>
                        <div class="value"><span id="cpu-temp" class="temp-val">--</span>°C</div>
                    </div>
                    <div class="metric">
                        <span class="label">Fan Speed</span>
                        <div class="value">
                            <svg id="cpu-fan-icon" class="fan-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 12c-3.3 0-6-2.7-6-6v-2c0-.6.4-1 1-1h10c.6 0 1 .4 1 1v2c0 3.3-2.7 6-6 6Z"></path><path d="M12 12c0 3.3 2.7 6 6 6h2c.6 0 1-.4 1-1V7c0-.6-.4-1-1-1h-2c-3.3 0-6 2.7-6 6Z"></path><path d="M12 12c3.3 0 6 2.7 6 6v2c0 .6-.4 1-1 1H7c-.6 0-1-.4-1-1v-2c0-3.3 2.7-6 6-6Z"></path><path d="M12 12c0-3.3-2.7-6-6-6H4c-.6 0-1 .4-1 1v10c0 .6.4 1 1 1h2c3.3 0 6-2.7 6-6Z"></path><circle cx="12" cy="12" r="2"></circle></svg>
                            <span id="cpu-fan">--</span> <span style="font-size: 1rem; font-weight: 400; color: var(--text-secondary);">RPM</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- GPU Section -->
            <div class="card glass">
                <div class="card-header">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect><line x1="6" y1="8" x2="6" y2="8"></line><line x1="10" y1="8" x2="10" y2="8"></line><line x1="14" y1="8" x2="14" y2="8"></line><line x1="18" y1="8" x2="18" y2="8"></line><line x1="6" y1="12" x2="6" y2="12"></line><line x1="10" y1="12" x2="10" y2="12"></line><line x1="14" y1="12" x2="14" y2="12"></line><line x1="18" y1="12" x2="18" y2="12"></line><line x1="6" y1="16" x2="6" y2="16"></line><line x1="10" y1="16" x2="10" y2="16"></line><line x1="14" y1="16" x2="14" y2="16"></line><line x1="18" y1="16" x2="18" y2="16"></line></svg>
                    GPU
                </div>
                <div class="metrics">
                    <div class="metric">
                        <span class="label">Temperature</span>
                        <div class="value"><span id="gpu-temp" class="temp-val">--</span>°C</div>
                    </div>
                    <div class="metric">
                        <span class="label">Fan Speed</span>
                        <div class="value">
                            <svg id="gpu-fan-icon" class="fan-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 12c-3.3 0-6-2.7-6-6v-2c0-.6.4-1 1-1h10c.6 0 1 .4 1 1v2c0 3.3-2.7 6-6 6Z"></path><path d="M12 12c0 3.3 2.7 6 6 6h2c.6 0 1-.4 1-1V7c0-.6-.4-1-1-1h-2c-3.3 0-6 2.7-6 6Z"></path><path d="M12 12c3.3 0 6 2.7 6 6v2c0 .6-.4 1-1 1H7c-.6 0-1-.4-1-1v-2c0-3.3 2.7-6 6-6Z"></path><path d="M12 12c0-3.3-2.7-6-6-6H4c-.6 0-1 .4-1 1v10c0 .6.4 1 1 1h2c3.3 0 6-2.7 6-6Z"></path><circle cx="12" cy="12" r="2"></circle></svg>
                            <span id="gpu-fan">--</span> <span style="font-size: 1rem; font-weight: 400; color: var(--text-secondary);">RPM</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <div class="controls">
            <button id="btn-max" class="btn btn-primary">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>
                Encender Turbina (MAX)
            </button>
            <button id="btn-auto" class="btn btn-secondary">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                Modo Automático (Auto)
            </button>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
